{{define "nav-bar"}}
<div class="top-bar">
  <img src="/static/elements/mre-small.png" alt="Martinrea">
  <nav class="nav-tabs">
    <a href="/" class="nav-tab{{if eq .ActiveTab "dashboard"}} active{{end}}">Dashboard</a>
    <a href="/counts" class="nav-tab{{if eq .ActiveTab "counts"}} active{{end}}">Production Counts</a>
    <a href="/reports" class="nav-tab{{if eq .ActiveTab "reports"}} active{{end}}">Reports</a>
    <a href="/workorders" class="nav-tab{{if eq .ActiveTab "workorders"}} active{{end}}">Work Orders</a>
    {{if .LoggedIn}}<a href="/settings" class="nav-tab{{if eq .ActiveTab "settings"}} active{{end}}" style="color:#e0a030;">Settings</a>
    <a href="/visual-mappings" class="nav-tab{{if eq .ActiveTab "mappings"}} active{{end}}" style="color:#e0a030;">Bit Mappings</a>
    <a href="/devtools" class="nav-tab{{if eq .ActiveTab "devtools"}} active{{end}}" style="color:#e0a030;">Dev Tools</a>{{end}}
  </nav>
  <div class="nav-spacer"></div>
  <span class="page-label"{{if .PageLabelStyle}} style="{{.PageLabelStyle}}"{{end}}>{{.PageLabel}}</span>
  {{if .LoggedIn}}
  <a href="#" class="nav-icon" title="Logout" onclick="document.getElementById('logout-form').submit();return false;">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
  </a>
  <form id="logout-form" method="POST" action="/logout" style="display:none"></form>
  {{else}}
  <a href="/login?next={{.LoginNext}}" class="nav-icon" title="Login">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
  </a>
  {{end}}
</div>
{{end}}

{{define "simple-bar"}}
<div class="simple-bar">
  <a href="/">&larr; Dashboard</a>
  <img src="/static/elements/mre-small.png" alt="MRE">
  <h1>{{.Title}}</h1>
  {{if .ShowLogout}}
  <div class="spacer"></div>
  <form method="POST" action="/logout" style="margin:0"><button type="submit" class="logout-btn">Logout</button></form>
  {{end}}
</div>
{{end}}
